<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ojos Verdes — Panel Presentadora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:#0d1208;color:#e8e0d0;min-height:100vh;position:relative;}
  canvas#bgPres{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
  .pres-hdr,.stats-bar,.controls,.q-container,.hist-section,.modal-bg,.toast{position:relative;z-index:1;}

  /* LOGO ANIMADO */
  .hdr-eye svg{width:42px;height:42px;display:block;overflow:visible;}
  .hdr-eye-circle{animation:hdrRotate 18s linear infinite;transform-origin:50px 50px;}
  .hdr-eye-rays{animation:hdrRays 3s ease-in-out infinite;transform-origin:50px 50px;}
  .hdr-eye-lid{animation:hdrBlink 5s ease-in-out infinite;transform-origin:50px 50px;}
  .hdr-eye-pupil{animation:hdrPulse 3s ease-in-out infinite;}
  @keyframes hdrRotate{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
  @keyframes hdrRays{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
  @keyframes hdrBlink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}
  @keyframes hdrPulse{0%,100%{r:5;}50%{r:7;}}
  /* HEADER */
  .pres-hdr{background:#0e1a08;border-bottom:2px solid #d4a843;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .hdr-left{display:flex;align-items:center;gap:12px;}
  .hdr-titles{}
  .pres-title{font-family:'Cinzel',serif;font-size:16px;letter-spacing:3px;color:#d4a843;line-height:1;}
  .pres-sub{font-size:10px;letter-spacing:3px;color:#4a7c3f;text-transform:uppercase;margin-top:2px;}
  .hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  .badge{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;letter-spacing:.5px;}
  .badge-gold{background:#2a2010;border:1px solid #d4a843;color:#d4a843;}
  .badge-green{background:#1a2a10;border:1px solid #4a7c3f;color:#97C459;}
  .badge-orange{background:#2a1208;border:1px solid #c4501a;color:#e8804a;}

  /* STATS BAR */
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:1rem;background:#0a1006;border-bottom:1px solid #1e2e14;}
  .stat-card{background:#111a0c;border:1px solid #1e2e14;border-radius:10px;padding:.75rem;text-align:center;}
  .stat-num{font-family:'Cinzel',serif;font-size:26px;color:#d4a843;line-height:1;}
  .stat-lbl{font-size:10px;color:#4a5a40;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}

  /* CONTROLES */
  .controls{padding:.75rem 1rem;display:flex;gap:8px;flex-wrap:wrap;background:#0a1006;border-bottom:1px solid #1e2e14;}
  .ctrl-btn{padding:7px 13px;border-radius:8px;border:1px solid #2e3e26;background:none;color:#5a6650;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;}
  .ctrl-btn:hover{border-color:#4a7c3f;color:#97C459;}
  .ctrl-btn.danger{border-color:#2a1208;color:#3a2010;}
  .ctrl-btn.danger:hover{border-color:#c4501a;color:#e8804a;}
  .search-wrap{flex:1;min-width:140px;}
  .search-wrap input{width:100%;background:#111a0c;border:1px solid #1e2e14;color:#e8e0d0;padding:7px 12px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
  .search-wrap input:focus{border-color:#4a7c3f;}
  .search-wrap input::placeholder{color:#3a4a30;}

  /* COLA */
  .q-container{padding:1rem;max-width:700px;margin:0 auto;}
  .section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#4a5a40;margin-bottom:10px;font-weight:700;padding-left:4px;}

  .q-item{background:#111a0c;border:1px solid #1e2e14;border-radius:14px;padding:1rem;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;transition:all .2s;}
  .q-item.playing{border-color:#d4a843;background:#16180a;box-shadow:0 0 0 1px #d4a843;}
  .q-item.done{opacity:.35;filter:grayscale(.4);}

  .q-order{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
  .q-pos{font-family:'Cinzel',serif;font-size:11px;color:#4a5a40;letter-spacing:1px;}
  .q-mesa-badge{background:#4a7c3f;color:#d4edcc;border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:20px;font-weight:700;}
  .q-mesa-badge.playing-b{background:#d4a843;color:#0d1208;}
  .q-mesa-badge.done-b{background:#1c2716;color:#2e3e26;}

  .q-info{flex:1;min-width:0;}
  .q-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
  .q-team{font-weight:700;font-size:15px;}
  .q-pill{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:700;letter-spacing:.5px;}
  .pill-mesa{background:#243318;color:#97C459;}
  .pill-playing{background:#d4a843;color:#0d1208;}
  .pill-wait{background:#1a2010;color:#5a6650;border:1px solid #2e3e26;}
  .q-artist{font-size:12px;color:#5a6650;margin-bottom:6px;}
  .q-songs{display:flex;flex-wrap:wrap;gap:4px;}
  .q-song-tag{background:#1a2a14;border-radius:5px;padding:3px 8px;font-size:11px;color:#7aaa68;font-weight:600;}
  .q-time{font-size:10px;color:#2e3e26;margin-top:4px;}

  .q-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
  .qa{background:none;border:1px solid #2e3e26;color:#5a6650;border-radius:7px;padding:5px 8px;cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif;font-weight:700;transition:all .15s;white-space:nowrap;text-align:center;min-width:36px;}
  .qa:hover{border-color:#5a6650;color:#e8e0d0;}
  .qa.play-qa{border-color:#4a7c3f;color:#97C459;}
  .qa.play-qa:hover{background:#4a7c3f;color:#d4edcc;}
  .qa.done-qa{border-color:#854F0B;color:#EF9F27;}
  .qa.done-qa:hover{background:#854F0B;color:#fff;}
  .qa.del-qa:hover{border-color:#791F1F;color:#e24b4a;}

  /* EMPTY */
  .empty{text-align:center;padding:4rem 1rem;color:#2e3e26;}
  .empty-icon{font-size:48px;margin-bottom:1rem;}
  .empty p{font-size:14px;line-height:1.8;}

  /* MODAL EDITAR */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;padding:1rem;}
  .modal-bg.open{display:flex;}
  .modal{background:#111a0c;border:1px solid #4a7c3f;border-radius:16px;padding:1.5rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'Cinzel',serif;font-size:18px;color:#d4a843;letter-spacing:2px;margin-bottom:1.25rem;}
  .fld{margin-bottom:1rem;}
  .fld label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#4a7c3f;margin-bottom:5px;font-weight:700;}
  .fld input{width:100%;background:#0d1208;border:1px solid #243318;color:#e8e0d0;padding:9px 13px;border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
  .fld input:focus{border-color:#4a7c3f;}
  .modal-btns{display:flex;gap:8px;margin-top:1.25rem;}
  .mbtn{flex:1;padding:10px;border-radius:9px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;}
  .mbtn.save{background:#4a7c3f;color:#d4edcc;}
  .mbtn.save:hover{background:#5a9c4e;}
  .mbtn.cancel{background:#1c2716;color:#5a6650;border:1px solid #2e3e26;}
  .mbtn.cancel:hover{color:#8aaa80;}

  /* TOAST */
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a2a10;border:1px solid #4a7c3f;color:#97C459;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;transition:opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}

  /* HISTORIAL */
  .hist-section{background:#0a1006;border-top:1px solid #1e2e14;padding:1rem;margin-top:1rem;}
  .hist-title{font-size:10px;letter-spacing:3px;color:#3a4a30;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
  .hist-list{display:flex;flex-wrap:wrap;gap:4px;}
  .hist-tag{background:#0d1208;border:1px solid #1e2e14;border-radius:5px;padding:2px 8px;font-size:11px;color:#3a4a30;}
</style>
</head>
<body>
<canvas id="bgPres"></canvas>

<!-- HEADER -->
<div class="pres-hdr">
  <div class="hdr-left">
    <div class="hdr-eye">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="hdrGlow">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Círculo exterior giratorio -->
        <g class="hdr-eye-circle">
          <circle cx="50" cy="50" r="47" fill="none" stroke="#e8e0d0" stroke-width="2.2" opacity=".85"/>
        </g>
        <!-- Rayos / pestañas -->
        <g class="hdr-eye-rays" filter="url(#hdrGlow)">
          <line x1="50" y1="18" x2="50" y2="10" stroke="#e8e0d0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="58" y1="19.5" x2="61" y2="12" stroke="#e8e0d0" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="65.5" y1="23" x2="70" y2="17" stroke="#e8e0d0" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="42" y1="19.5" x2="39" y2="12" stroke="#e8e0d0" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="34.5" y1="23" x2="30" y2="17" stroke="#e8e0d0" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="72" y1="29" x2="78" y2="24" stroke="#e8e0d0" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="28" y1="29" x2="22" y2="24" stroke="#e8e0d0" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="50" y1="82" x2="50" y2="90" stroke="#e8e0d0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="58" y1="80.5" x2="61" y2="88" stroke="#e8e0d0" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="65.5" y1="77" x2="70" y2="83" stroke="#e8e0d0" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="42" y1="80.5" x2="39" y2="88" stroke="#e8e0d0" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="34.5" y1="77" x2="30" y2="83" stroke="#e8e0d0" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="72" y1="71" x2="78" y2="76" stroke="#e8e0d0" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="28" y1="71" x2="22" y2="76" stroke="#e8e0d0" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="14" y1="50" x2="7" y2="50" stroke="#e8e0d0" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="86" y1="50" x2="93" y2="50" stroke="#e8e0d0" stroke-width="1.8" stroke-linecap="round"/>
        </g>
        <!-- Ojo con parpadeo -->
        <g class="hdr-eye-lid" filter="url(#hdrGlow)">
          <path d="M14 50 Q22 34 50 32 Q78 34 86 50 Q78 66 50 68 Q22 66 14 50 Z"
                fill="none" stroke="#e8e0d0" stroke-width="2.4" stroke-linejoin="round"/>
          <circle cx="50" cy="50" r="11" fill="none" stroke="#e8e0d0" stroke-width="2.2"/>
          <circle cx="50" cy="50" r="5" fill="#e8e0d0" class="hdr-eye-pupil"/>
          <circle cx="53" cy="47" r="2" fill="#4a7c3f" opacity=".85"/>
        </g>
      </svg>
    </div>
    <div class="hdr-titles">
      <div class="pres-title">OJOS VERDES</div>
      <div class="pres-sub">Panel de presentadora</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="badge badge-gold" id="badgeTotal">0 total</span>
    <span class="badge badge-green" id="badgeWait">0 en espera</span>
    <span class="badge badge-orange" id="badgeDone">0 listos</span>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-num" id="statEspera">0</div>
    <div class="stat-lbl">En espera</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statCanciones">0</div>
    <div class="stat-lbl">Canciones</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statMesas">0</div>
    <div class="stat-lbl">Mesas activas</div>
  </div>
</div>

<!-- CONTROLES -->
<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar equipo, mesa, cancion..." oninput="renderQueue()">
  </div>
  <button class="ctrl-btn" onclick="toggleHist()">Historial</button>
  <button class="ctrl-btn danger" onclick="resetAll()">Resetear noche</button>
</div>

<!-- COLA -->
<div class="q-container">
  <div class="section-title" id="queueLabel">Cola de peticiones</div>
  <div id="qList"></div>

  <!-- HISTORIAL -->
  <div class="hist-section" id="histSection" style="display:none;">
    <div class="hist-title">Canciones pedidas esta noche (no se repiten)</div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">Editar peticion</div>
    <div class="fld">
      <label>Nombre del equipo</label>
      <input type="text" id="editTeam" maxlength="40">
    </div>
    <div class="fld">
      <label>Artista principal</label>
      <input type="text" id="editArtist" maxlength="40">
    </div>
    <div id="editSongs"></div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbtn save" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, push, update, remove, onValue, get }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC3Kr6BBTZEJ9PSd3Ncjxmc-LjA1P3Dq1w",
  authDomain: "ojos-verdes-karaoke.firebaseapp.com",
  databaseURL: "https://ojos-verdes-karaoke-default-rtdb.firebaseio.com",
  projectId: "ojos-verdes-karaoke",
  storageBucket: "ojos-verdes-karaoke.firebasestorage.app",
  messagingSenderId: "255639804155",
  appId: "1:255639804155:web:352e475df52aaab904f85e",
  measurementId: "G-HEBTRNP832"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ── Estado local (se sincroniza desde Firebase) ── */
let queue       = [];   // [{_key, mesa, team, songs, status, ts}, ...]
let histVisible = false;
let editingKey  = null;

/* ── Toast ── */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ── Escucha en tiempo real ── */
onValue(ref(db,'queue'), snap => {
  queue = snap.exists()
    ? Object.entries(snap.val()).map(([k,v])=>({_key:k,...v}))
    : [];
  // Ordenar por timestamp de creación
  queue.sort((a,b)=>(a.ts||0)-(b.ts||0));
  renderQueue();
});

/* ── Reset noche ── */
async function resetAll(){
  if(!confirm('¿Resetear toda la noche? Se borraran peticiones, historial y cooldowns.')) return;
  await Promise.all([
    set(ref(db,'queue'), null),
    set(ref(db,'hist'),  null),
    set(ref(db,'cool'),  null)
  ]);
  toast('Noche reiniciada');
}
window.resetAll = resetAll;

/* ── Historial ── */
function toggleHist(){
  histVisible = !histVisible;
  document.getElementById('histSection').style.display = histVisible ? 'block' : 'none';
  if(histVisible) renderHist();
}
window.toggleHist = toggleHist;

async function renderHist(){
  const snap = await get(ref(db,'hist'));
  const hist = snap.exists() ? Object.values(snap.val()) : [];
  const c = document.getElementById('histList');
  c.innerHTML = hist.length
    ? hist.map(h=>`<span class="hist-tag">${h}</span>`).join('')
    : '<span style="font-size:12px;color:#3a4a30;">Sin canciones aun</span>';
}

/* ── Render cola ── */
function formatTime(ts){
  return new Date(ts).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

function renderQueue(){
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  const filtered = search ? queue.filter(item =>
    item.team.toLowerCase().includes(search) ||
    String(item.mesa).includes(search) ||
    (item.songs||[]).some(s=>s.title.toLowerCase().includes(search))
  ) : queue;

  const waiting    = queue.filter(q=>q.status==='waiting').length;
  const playing    = queue.filter(q=>q.status==='playing').length;
  const done       = queue.filter(q=>q.status==='done').length;
  const mesas      = new Set(queue.filter(q=>q.status!=='done').map(q=>q.mesa)).size;
  const totalSongs = queue.reduce((acc,q)=>acc+(q.songs||[]).length, 0);

  document.getElementById('statEspera').textContent    = waiting + playing;
  document.getElementById('statCanciones').textContent = totalSongs;
  document.getElementById('statMesas').textContent     = mesas;
  document.getElementById('badgeTotal').textContent    = queue.length + ' total';
  document.getElementById('badgeWait').textContent     = waiting + ' en espera';
  document.getElementById('badgeDone').textContent     = done + ' listos';
  document.getElementById('queueLabel').textContent    = search
    ? `Resultados (${filtered.length})`
    : `Cola de peticiones (${queue.length})`;

  const c = document.getElementById('qList');
  if(!filtered.length){
    c.innerHTML = `<div class="empty"><div class="empty-icon">—</div><p>${
      search ? 'Sin resultados para "'+search+'"' : 'Aun no hay peticiones.<br>Las mesas empezaran pronto.'
    }</p></div>`;
    return;
  }

  c.innerHTML = '';
  let waitPos = 0;
  filtered.forEach(item => {
    const isPlaying = item.status === 'playing';
    const isDone    = item.status === 'done';
    if(!isDone && !isPlaying) waitPos++;

    const d      = document.createElement('div');
    d.className  = 'q-item' + (isPlaying?' playing':'') + (isDone?' done':'');
    const mClass = 'q-mesa-badge' + (isPlaying?' playing-b':'') + (isDone?' done-b':'');
    const songTags = (item.songs||[]).map(s=>`<span class="q-song-tag">${s.title}${s.artist?' — '+s.artist:''}</span>`).join('');
    const pillHtml = isPlaying
      ? '<span class="q-pill pill-playing">&#9654; En turno</span>'
      : isDone ? '' : '<span class="q-pill pill-wait">En espera</span>';

    // Posición en la cola para subir/bajar
    const qIdx = queue.findIndex(x=>x._key===item._key);

    d.innerHTML = `
      <div class="q-order">
        <div class="q-pos">${isDone ? '&#10003;' : (isPlaying ? '&#9654;' : '#'+waitPos)}</div>
        <div class="${mClass}">${item.mesa}</div>
      </div>
      <div class="q-info">
        <div class="q-top">
          <span class="q-pill pill-mesa">Mesa ${item.mesa}</span>
          <span class="q-team">${item.team}</span>
          ${pillHtml}
        </div>
        <div class="q-songs">${songTags}</div>
        <div class="q-time">Pedido a las ${formatTime(item.ts||item._key)}</div>
      </div>
      <div class="q-actions">
        ${!isDone ? `
          ${qIdx > 0 && queue[qIdx-1].status !== 'done' ? `<button class="qa" onclick="mv('${item._key}',-1)" title="Subir">&#8593;</button>` : ''}
          ${qIdx < queue.length-1 ? `<button class="qa" onclick="mv('${item._key}',1)" title="Bajar">&#8595;</button>` : ''}
          ${!isPlaying ? `<button class="qa play-qa" onclick="setPlay('${item._key}')" title="Dar turno">&#9654;</button>` : ''}
          <button class="qa" onclick="openEdit('${item._key}')" title="Editar">&#9998;</button>
          <button class="qa done-qa" onclick="setDone('${item._key}')" title="Marcar listo">&#10003;</button>
        ` : `<button class="qa del-qa" onclick="del('${item._key}')" title="Eliminar">&#10005;</button>`}
      </div>`;
    c.appendChild(d);
  });

  if(histVisible) renderHist();
}
window.renderQueue = renderQueue;

/* ── Acciones de cola ── */
async function mv(key, dir){
  const idx = queue.findIndex(x=>x._key===key);
  const ni  = idx + dir;
  if(ni < 0 || ni >= queue.length) return;
  // Intercambiar timestamps para reordenar
  const tsA = queue[idx].ts, tsB = queue[ni].ts;
  await Promise.all([
    update(ref(db,`queue/${queue[idx]._key}`), {ts: tsB}),
    update(ref(db,`queue/${queue[ni]._key}`),  {ts: tsA})
  ]);
  toast('Orden actualizado');
}
window.mv = mv;

async function setPlay(key){
  const updates = {};
  queue.forEach(item => {
    if(item.status === 'playing') updates[`queue/${item._key}/status`] = 'waiting';
  });
  updates[`queue/${key}/status`] = 'playing';
  await update(ref(db), updates);
  const item = queue.find(x=>x._key===key);
  toast(`Es el turno de: ${item.team} — Mesa ${item.mesa}`);
}
window.setPlay = setPlay;

async function setDone(key){
  await update(ref(db,`queue/${key}`), {status:'done'});
  toast('Marcado como listo');
}
window.setDone = setDone;

async function del(key){
  await remove(ref(db,`queue/${key}`));
  toast('Peticion eliminada');
}
window.del = del;

/* ── Edicion ── */
function openEdit(key){
  editingKey = key;
  const item = queue.find(x=>x._key===key);
  document.getElementById('editTeam').value   = item.team;
  document.getElementById('editArtist').value = item.artist || '';
  const sc = document.getElementById('editSongs');
  sc.innerHTML = '';
  (item.songs||[]).forEach((s,i) => {
    sc.innerHTML += `
      <div class="fld"><label>Cancion ${i+1}</label>
        <input type="text" id="eSong${i}" value="${s.title}" maxlength="60">
      </div>
      <div class="fld"><label>Artista cancion ${i+1}</label>
        <input type="text" id="eArt${i}" value="${s.artist||''}" maxlength="40">
      </div>`;
  });
  document.getElementById('modalBg').classList.add('open');
}
window.openEdit = openEdit;

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  editingKey = null;
}
window.closeModal = closeModal;

async function saveEdit(){
  if(!editingKey) return;
  const item    = queue.find(x=>x._key===editingKey);
  const newTeam = document.getElementById('editTeam').value.trim()   || item.team;
  const newArt  = document.getElementById('editArtist').value.trim();
  const newSongs = (item.songs||[]).map((s,i) => ({
    title:  (document.getElementById('eSong'+i)?.value.trim() || s.title),
    artist: (document.getElementById('eArt'+i)?.value.trim() || '')
  }));
  await update(ref(db,`queue/${editingKey}`), {
    team: newTeam, artist: newArt, songs: newSongs
  });
  closeModal();
  toast('Peticion actualizada');
}
window.saveEdit = saveEdit;

document.getElementById('modalBg').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

/* ── Fondo animado ── */
(function(){
  const canvas = document.getElementById('bgPres');
  const ctx    = canvas.getContext('2d');
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const COLORS=['#4a7c3f','#d4a843','#97C459','#c4501a','#6aaa5f'];
  const particles=[];
  for(let i=0;i<55;i++) particles.push({
    x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    r:Math.random()*1.6+0.3, vy:-(Math.random()*0.35+0.05),
    vx:(Math.random()-0.5)*0.15, opacity:Math.random()*0.4+0.05,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    twinkle:Math.random()*Math.PI*2, twinkleSpeed:Math.random()*0.03+0.01
  });
  const orbs=[
    {x:0.15,y:0.3,r:180,color:'#1a3a12',speed:0.0004},
    {x:0.85,y:0.6,r:220,color:'#2a2008',speed:0.0003},
    {x:0.5,y:0.85,r:160,color:'#1a2a10',speed:0.0005}
  ];
  let orbT=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); orbT+=0.01;
    orbs.forEach((o,i)=>{
      const px=(o.x+Math.sin(orbT*o.speed*1000+i)*0.06)*canvas.width;
      const py=(o.y+Math.cos(orbT*o.speed*1000+i)*0.04)*canvas.height;
      const g=ctx.createRadialGradient(px,py,0,px,py,o.r);
      g.addColorStop(0,o.color+'cc'); g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(px,py,o.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    });
    particles.forEach(p=>{
      p.twinkle+=p.twinkleSpeed;
      const alpha=p.opacity*(0.5+0.5*Math.sin(p.twinkle));
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.globalAlpha=alpha; ctx.fill(); ctx.globalAlpha=1;
      p.y+=p.vy; p.x+=p.vx;
      if(p.y<-5){p.y=canvas.height+5;p.x=Math.random()*canvas.width;}
      if(p.x<-5||p.x>canvas.width+5){p.x=Math.random()*canvas.width;}
    });
    for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<90){
        ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle='#4a7c3f'; ctx.globalAlpha=(1-dist/90)*0.08;
        ctx.lineWidth=0.5; ctx.stroke(); ctx.globalAlpha=1;
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
